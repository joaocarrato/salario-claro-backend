services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: salario-claro-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - salario-claro

  nginx:
    image: nginx:1.27-alpine
    container_name: salario-claro-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - salario-claro

  postgres:
    image: postgres:16-alpine
    container_name: salario-claro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salario_claro
      POSTGRES_USER: salario_claro
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salario_claro -d salario_claro"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - salario-claro

networks:
  salario-claro:
    driver: bridge

volumes:
  postgres-data:
    driver: local
